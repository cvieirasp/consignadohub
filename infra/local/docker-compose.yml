services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: consignadohub-sqlserver
    environment:
      SA_PASSWORD: "ConsignadoHub!2026"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1444:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - consignadohub
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "ConsignadoHub!2026" -Q "SELECT 1" -No
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management
    container_name: consignadohub-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: consignadohub
      RABBITMQ_DEFAULT_PASS: "ConsignadoHub!2026"
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - consignadohub
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: consignadohub-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - keycloak-data:/opt/keycloak/data
    networks:
      - consignadohub
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  sqlserver-data:
  rabbitmq-data:
  keycloak-data:


networks:
  consignadohub:
    driver: bridge
